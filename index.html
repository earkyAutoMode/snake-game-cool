<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game Cool</title>
    <style>
        :root {
            --bg-color: #0d0221;
            --snake-color: #00f2ff;
            --food-color: #ff007b;
            --particle-color: #f7eb00;
            --text-color: #00f2ff;
            --ui-bg: rgba(13, 2, 33, 0.85);
            --glow: 0 0 10px var(--snake-color), 0 0 20px var(--snake-color);
            --food-glow: 0 0 10px var(--food-color), 0 0 20px var(--food-color);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: var(--glow);
        }

        canvas {
            background: #000;
            border: 2px solid var(--snake-color);
            box-shadow: var(--glow), inset 0 0 15px rgba(0, 242, 255, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--ui-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            transition: opacity 0.3s;
        }

        .hidden {
            display: none;
            pointer-events: none;
            opacity: 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: var(--glow);
        }

        p {
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: rgba(0, 242, 255, 0.7);
        }

        button {
            background: transparent;
            border: 2px solid var(--snake-color);
            color: var(--text-color);
            padding: 12px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: var(--glow);
            transition: all 0.2s;
            border-radius: 4px;
        }

        button:hover, button:active {
            background: var(--snake-color);
            color: var(--bg-color);
            box-shadow: 0 0 30px var(--snake-color);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(0, 242, 255, 0.5);
            text-align: center;
        }

        /* Mobile specific adjustments */
        @media (max-height: 600px) {
            h1 { font-size: 1.5rem; }
            .score-board { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>Best: <span id="high-score">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- Start Overlay -->
    <div id="start-screen" class="overlay">
        <h1>NEON SNAKE</h1>
        <p>A classic reborn in light.</p>
        <button id="start-btn">Start Game</button>
        <div class="controls-hint">
            PC: Arrow Keys or WASD<br>
            Mobile: Swipe to Turn
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over-screen" class="overlay hidden">
        <h1 style="color: var(--food-color); text-shadow: var(--food-glow);">GAME OVER</h1>
        <p>Your Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Restart</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const highScoreElement = document.getElementById('high-score');
    const finalScoreElement = document.getElementById('final-score');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');

    // Constants
    const GRID_SIZE = 20;
    const TILE_COUNT = canvas.width / GRID_SIZE;
    const INITIAL_SPEED = 150;
    const MIN_SPEED = 60;
    const SPEED_DECREMENT = 5; // how much faster it gets every 5 points

    // State
    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let dx = 0;
    let dy = 0;
    let score = 0;
    let highScore = localStorage.getItem('neon-snake-high-score') || 0;
    let gameLoop;
    let currentSpeed = INITIAL_SPEED;
    let nextDx = 0;
    let nextDy = 0;
    let lastTime = 0;
    let isGameRunning = false;
    let particles = [];

    highScoreElement.textContent = highScore;

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.size = Math.random() * 3 + 1;
            this.speedX = (Math.random() - 0.5) * 8;
            this.speedY = (Math.random() - 0.5) * 8;
            this.life = 1.0;
            this.decay = Math.random() * 0.05 + 0.02;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= this.decay;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }
    }

    function createParticles(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function drawGrid() {
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
        ctx.lineWidth = 1;
        for (let i = 0; i < TILE_COUNT; i++) {
            ctx.beginPath();
            ctx.moveTo(i * GRID_SIZE, 0);
            ctx.lineTo(i * GRID_SIZE, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * GRID_SIZE);
            ctx.lineTo(canvas.width, i * GRID_SIZE);
            ctx.stroke();
        }
    }

    function drawSnake() {
        snake.forEach((segment, index) => {
            const isHead = index === 0;
            ctx.fillStyle = isHead ? '#fff' : 'var(--snake-color)';
            ctx.shadowBlur = isHead ? 20 : 10;
            ctx.shadowColor = 'var(--snake-color)';
            
            ctx.beginPath();
            const x = segment.x * GRID_SIZE;
            const y = segment.y * GRID_SIZE;
            const radius = isHead ? 6 : 4;
            
            // Draw segment as rounded box
            roundRect(ctx, x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2, radius);
            ctx.fill();
            ctx.shadowBlur = 0;
        });
    }

    function roundRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    function drawFood() {
        ctx.fillStyle = 'var(--food-color)';
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'var(--food-color)';
        ctx.beginPath();
        const x = food.x * GRID_SIZE + GRID_SIZE / 2;
        const y = food.y * GRID_SIZE + GRID_SIZE / 2;
        ctx.arc(x, y, GRID_SIZE / 2 - 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
            } else {
                particles[i].draw();
            }
        }
    }

    function moveSnake() {
        dx = nextDx;
        dy = nextDy;
        
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        
        // Wall collision
        if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
            gameOver();
            return;
        }

        // Body collision
        for (let i = 0; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) {
                gameOver();
                return;
            }
        }

        snake.unshift(head);

        // Food check
        if (head.x === food.x && head.y === food.y) {
            score += 1;
            scoreElement.textContent = score;
            createParticles(head.x * GRID_SIZE + GRID_SIZE/2, head.y * GRID_SIZE + GRID_SIZE/2, 'var(--food-color)');
            generateFood();
            
            // Speed up
            if (score % 5 === 0 && currentSpeed > MIN_SPEED) {
                currentSpeed -= SPEED_DECREMENT;
            }
        } else {
            snake.pop();
        }
    }

    function generateFood() {
        food = {
            x: Math.floor(Math.random() * TILE_COUNT),
            y: Math.floor(Math.random() * TILE_COUNT)
        };
        // Ensure food doesn't land on snake
        snake.forEach(segment => {
            if (segment.x === food.x && segment.y === food.y) generateFood();
        });
    }

    function gameOver() {
        isGameRunning = false;
        gameOverScreen.classList.remove('hidden');
        finalScoreElement.textContent = score;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('neon-snake-high-score', highScore);
            highScoreElement.textContent = highScore;
        }
    }

    function resetGame() {
        snake = [{x: 10, y: 10}];
        nextDx = 1;
        nextDy = 0;
        dx = 1;
        dy = 0;
        score = 0;
        currentSpeed = INITIAL_SPEED;
        scoreElement.textContent = score;
        generateFood();
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        isGameRunning = true;
        lastTime = performance.now();
        requestAnimationFrame(main);
    }

    function main(currentTime) {
        if (!isGameRunning) return;

        requestAnimationFrame(main);

        const delta = currentTime - lastTime;
        if (delta < currentSpeed) {
            // still draw particles and UI updates for smoothness
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            drawSnake();
            drawFood();
            updateParticles();
            return;
        }

        lastTime = currentTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        moveSnake();
        drawSnake();
        drawFood();
        updateParticles();
    }

    // Controls
    window.addEventListener('keydown', e => {
        switch(e.key) {
            case 'ArrowUp': case 'w': if (dy !== 1) { nextDx = 0; nextDy = -1; } break;
            case 'ArrowDown': case 's': if (dy !== -1) { nextDx = 0; nextDy = 1; } break;
            case 'ArrowLeft': case 'a': if (dx !== 1) { nextDx = -1; nextDy = 0; } break;
            case 'ArrowRight': case 'd': if (dx !== -1) { nextDx = 1; nextDy = 0; } break;
        }
        // Start game with arrow keys if not running
        if (!isGameRunning && startScreen.classList.contains('hidden') === false) {
             resetGame();
        }
    });

    // Touch Controls (Swipe)
    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, {passive: true});

    canvas.addEventListener('touchend', e => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (diffX > 30 && dx !== -1) { nextDx = 1; nextDy = 0; }
            else if (diffX < -30 && dx !== 1) { nextDx = -1; nextDy = 0; }
        } else {
            if (diffY > 30 && dy !== -1) { nextDx = 0; nextDy = 1; }
            else if (diffY < -30 && dy !== 1) { nextDx = 0; nextDy = -1; }
        }
    }, {passive: true});

    startBtn.addEventListener('click', resetGame);
    restartBtn.addEventListener('click', resetGame);

    // Initial draw
    drawGrid();
    drawSnake();
    drawFood();

</script>

</body>
</html>
