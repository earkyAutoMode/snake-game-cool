<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game Cool</title>
    <style>
        :root {
            --bg-color: #0d0221;
            --snake-color: #00f2ff;
            --food-color: #ff007b;
            --particle-color: #f7eb00;
            --text-color: #00f2ff;
            --ui-bg: rgba(13, 2, 33, 0.9);
            --glow: 0 0 10px var(--snake-color), 0 0 20px var(--snake-color);
            --food-glow: 0 0 10px var(--food-color), 0 0 20px var(--food-color);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 10px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: var(--glow);
        }

        .score-display {
            display: flex;
            gap: 15px;
        }

        canvas {
            background: #000;
            border: 2px solid var(--snake-color);
            box-shadow: var(--glow), inset 0 0 15px rgba(0, 242, 255, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            max-height: 70vh;
            aspect-ratio: 1 / 1;
            touch-action: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--ui-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            transition: opacity 0.3s;
        }

        .hidden {
            display: none !important;
            pointer-events: none;
            opacity: 0;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: var(--glow);
        }

        p {
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: rgba(0, 242, 255, 0.7);
        }

        button {
            background: transparent;
            border: 2px solid var(--snake-color);
            color: var(--text-color);
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: var(--glow);
            transition: all 0.2s;
            border-radius: 4px;
        }

        button:hover, button:active {
            background: var(--snake-color);
            color: var(--bg-color);
            box-shadow: 0 0 30px var(--snake-color);
        }

        #pause-btn {
            padding: 5px 10px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(0, 242, 255, 0.5);
            text-align: center;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .score-board { font-size: 0.9rem; }
            #game-container { padding: 5px; }
        }

        @media (max-height: 600px) {
            h1 { font-size: 1.5rem; margin-bottom: 5px; }
            p { margin-bottom: 10px; }
            .controls-hint { margin-top: 10px; }
            canvas { max-height: 60vh; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="score-board">
        <div class="score-display">
            <div>Score: <span id="score">0</span></div>
            <div>Best: <span id="high-score">0</span></div>
        </div>
        <button id="pause-btn">PAUSE</button>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- Start Overlay -->
    <div id="start-screen" class="overlay">
        <h1>NEON SNAKE</h1>
        <p>A classic reborn in light.</p>
        <button id="start-btn">Start Game</button>
        <div class="controls-hint">
            PC: Arrow Keys or WASD / SPACE to Pause<br>
            Mobile: Swipe to Turn / Tap PAUSE
        </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pause-screen" class="overlay hidden">
        <h1>PAUSED</h1>
        <p>Take a breath, stay focused.</p>
        <button id="resume-btn">Resume</button>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over-screen" class="overlay hidden">
        <h1 style="color: var(--food-color); text-shadow: var(--food-glow);">GAME OVER</h1>
        <p>Your Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Restart</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const highScoreElement = document.getElementById('high-score');
    const finalScoreElement = document.getElementById('final-score');
    const startScreen = document.getElementById('start-screen');
    const pauseScreen = document.getElementById('pause-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const resumeBtn = document.getElementById('resume-btn');

    // Constants
    const GRID_SIZE = 20;
    const TILE_COUNT = canvas.width / GRID_SIZE;
    const INITIAL_SPEED = 150;
    const MIN_SPEED = 60;
    const SPEED_DECREMENT = 5;

    // State
    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let dx = 1;
    let dy = 0;
    let score = 0;
    let highScore = localStorage.getItem('neon-snake-high-score') || 0;
    let gameLoop;
    let currentSpeed = INITIAL_SPEED;
    let nextDx = 1;
    let nextDy = 0;
    let lastTime = 0;
    let isGameRunning = false;
    let isPaused = false;
    let particles = [];

    highScoreElement.textContent = highScore;

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.size = Math.random() * 3 + 1;
            this.speedX = (Math.random() - 0.5) * 8;
            this.speedY = (Math.random() - 0.5) * 8;
            this.life = 1.0;
            this.decay = Math.random() * 0.05 + 0.02;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= this.decay;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.life;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }
    }

    function createExplosion(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push(new Particle(x * GRID_SIZE + GRID_SIZE/2, y * GRID_SIZE + GRID_SIZE/2, color));
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }
    }

    function drawGrid() {
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= TILE_COUNT; i++) {
            ctx.beginPath(); ctx.moveTo(i * GRID_SIZE, 0); ctx.lineTo(i * GRID_SIZE, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i * GRID_SIZE); ctx.lineTo(canvas.width, i * GRID_SIZE); ctx.stroke();
        }
    }

    function drawSnake() {
        snake.forEach((segment, index) => {
            const isHead = index === 0;
            ctx.fillStyle = isHead ? varColor('--snake-color') : 'rgba(0, 242, 255, 0.8)';
            ctx.shadowBlur = isHead ? 20 : 10;
            ctx.shadowColor = varColor('--snake-color');
            
            // Rounded corners for snake
            ctx.beginPath();
            ctx.roundRect(segment.x * GRID_SIZE + 2, segment.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4, 4);
            ctx.fill();
            ctx.shadowBlur = 0;
        });
    }

    function drawFood() {
        ctx.fillStyle = varColor('--food-color');
        ctx.shadowBlur = 15;
        ctx.shadowColor = varColor('--food-color');
        ctx.beginPath();
        const pulse = Math.sin(Date.now() / 150) * 2;
        ctx.arc(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, (GRID_SIZE/2 - 4) + pulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function moveSnake() {
        dx = nextDx;
        dy = nextDy;
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};

        // Wall Collision
        if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
            return gameOver();
        }

        // Self Collision
        for (let segment of snake) {
            if (head.x === segment.x && head.y === segment.y) return gameOver();
        }

        snake.unshift(head);

        // Food Collision
        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreElement.textContent = score;
            createExplosion(food.x, food.y, varColor('--food-color'));
            generateFood();
            if (score % 5 === 0 && currentSpeed > MIN_SPEED) {
                currentSpeed -= SPEED_DECREMENT;
            }
        } else {
            snake.pop();
        }
    }

    function generateFood() {
        food = {
            x: Math.floor(Math.random() * TILE_COUNT),
            y: Math.floor(Math.random() * TILE_COUNT)
        };
        if (snake.some(segment => segment.x === food.x && segment.y === food.y)) generateFood();
    }

    function gameOver() {
        isGameRunning = false;
        gameOverScreen.classList.remove('hidden');
        finalScoreElement.textContent = score;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('neon-snake-high-score', highScore);
            highScoreElement.textContent = highScore;
        }
    }

    function resetGame() {
        snake = [{x: 10, y: 10}];
        nextDx = 1; nextDy = 0; dx = 1; dy = 0;
        score = 0;
        currentSpeed = INITIAL_SPEED;
        scoreElement.textContent = score;
        generateFood();
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        pauseScreen.classList.add('hidden');
        isPaused = false;
        isGameRunning = true;
        lastTime = performance.now();
        requestAnimationFrame(main);
    }

    function togglePause() {
        if (!isGameRunning) return;
        isPaused = !isPaused;
        if (isPaused) {
            pauseScreen.classList.remove('hidden');
            pauseBtn.textContent = 'RESUME';
        } else {
            pauseScreen.classList.add('hidden');
            pauseBtn.textContent = 'PAUSE';
            lastTime = performance.now(); // Reset timer
            requestAnimationFrame(main);
        }
    }

    function main(currentTime) {
        if (!isGameRunning || isPaused) return;

        requestAnimationFrame(main);

        const delta = currentTime - lastTime;
        if (delta < currentSpeed) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            drawSnake();
            drawFood();
            updateParticles();
            return;
        }

        lastTime = currentTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        moveSnake();
        drawSnake();
        drawFood();
        updateParticles();
    }

    // Controls
    window.addEventListener('keydown', e => {
        if (e.key === ' ') {
            e.preventDefault();
            togglePause();
            return;
        }

        if (isPaused) return;

        switch(e.key.toLowerCase()) {
            case 'arrowup': case 'w': if (dy !== 1) { nextDx = 0; nextDy = -1; } break;
            case 'arrowdown': case 's': if (dy !== -1) { nextDx = 0; nextDy = 1; } break;
            case 'arrowleft': case 'a': if (dx !== 1) { nextDx = -1; nextDy = 0; } break;
            case 'arrowright': case 'd': if (dx !== -1) { nextDx = 1; nextDy = 0; } break;
        }

        if (!isGameRunning && !startScreen.classList.contains('hidden')) {
             resetGame();
        }
    });

    // Touch Controls (Swipe)
    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, {passive: true});

    canvas.addEventListener('touchend', e => {
        if (isPaused) return;
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (diffX > 30 && dx !== -1) { nextDx = 1; nextDy = 0; }
            else if (diffX < -30 && dx !== 1) { nextDx = -1; nextDy = 0; }
        } else {
            if (diffY > 30 && dy !== -1) { nextDx = 0; nextDy = 1; }
            else if (diffY < -30 && dy !== 1) { nextDx = 0; nextDy = -1; }
        }
    }, {passive: true});

    startBtn.addEventListener('click', resetGame);
    restartBtn.addEventListener('click', resetGame);
    pauseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePause();
    });
    resumeBtn.addEventListener('click', togglePause);

    // Initial draw
    drawGrid();
    drawSnake();
    drawFood();

</script>

</body>
</html>
